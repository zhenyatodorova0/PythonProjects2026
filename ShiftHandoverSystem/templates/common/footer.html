<footer>
    <div class="footer-left">&copy; Database Team. All rights reserved.</div>
    <div class="footer-right">
        <span>Current time: <span id="footer-current-time"></span></span>
    </div>
</footer>
<script>
    (function () {
        const el = document.getElementById("footer-current-time");
        if (!el) return;

        const updateClock = () => {
            const now = new Date();
            const pad = (n) => String(n).padStart(2, "0");
            const formatted = `${pad(now.getDate())}/${pad(now.getMonth() + 1)}/${now.getFullYear()} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            el.textContent = formatted;
        };

        updateClock();
        setInterval(updateClock, 1000);
    })();
</script>
