{% extends 'base.html' %}
{% load markdown_extras %}

{% block content %}
<div class="posts">
    <div class="post">
        <div class="header">
            <h2>{{ post.title|lower|capfirst}}</h2>
        </div>

        <p>{{ post.content|markdown|truncatewords:3 }}</p>
        <span>Posted by {{ post.author|default:"Anonymous" }} on {{ post.created_at|date:'d-m-Y' }}</span>
    </div>
</div>
{% endblock %}
